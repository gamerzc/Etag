<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta http-equiv="content-type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>墨水屏电子相册挂件</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@40;50;60&display=swap" rel="stylesheet">
	<!-- 引入CropperJS CDN -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
	<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
	<style>
		/* Apple 全局基础样式 */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
			-webkit-font-smoothing: antialiased;
		}

		body {
			background-color: #f5f5f7;
			color: #1d1d1f;
			padding: 40px 16px;
			min-height: 100vh;
			overflow-y: auto;
			line-height: 1.48;
		}

		/* 主卡片容器 */
		.wrap {
			max-width: 920px;
			margin: 0 auto;
			background: #ffffff;
			border-radius: 24px;
			box-shadow: 0 4px 32px rgba(0, 0, 0, 0.05);
			padding: 44px;
		}

		/* 标题层级 */
		h2 {
			font-size: 32px;
			font-weight: 600;
			text-align: center;
			color: #1d1d1f;
			margin-bottom: 40px;
			letter-spacing: 0.3px;
		}

		h3 {
			font-size: 19px;
			font-weight: 500;
			color: #48484a;
			margin-bottom: 14px;
		}

		/* 模块分割 */
		.section {
			padding-bottom: 28px;
			margin-bottom: 28px;
			border-bottom: 1px solid #e8e8ed;
		}
		.section:last-of-type {
			border-bottom: none;
			margin-bottom: 0;
			padding-bottom: 0;
		}

		/* 苹果标准按钮 */
		button {
			border: none;
			border-radius: 999px;
			padding: 9px 22px;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.22s ease;
			margin: 4px 6px;
		}
		.btn-primary {
			background-color: #0071e3;
			color: #fff;
		}
		.btn-primary:hover {
			background-color: #0077ed;
			transform: translateY(-1px);
		}
		.btn-primary:active {
			transform: translateY(0);
		}
		.btn-secondary {
			background-color: #f2f2f7;
			color: #0071e3;
		}
		.btn-secondary:hover {
			background-color: #e2e2ea;
		}
		.btn-save {
			background-color: #34c759;
			color: white;
			margin-top: 16px;
			padding: 11px 26px;
			font-size: 15px;
		}
		.btn-save:hover {
			background-color: #30d158;
		}

		/* 输入控件统一样式 */
		input[type="file"],
		input[type="number"],
		select {
			border: 1px solid #d2d2d7;
			border-radius: 12px;
			padding: 8px 12px;
			font-size: 14px;
			background: #fbfbfd;
			color: #1d1d1f;
			outline: none;
			transition: border-color 0.2s;
			margin: 0 6px;
		}
		input:focus,
		select:focus {
			border-color: #0071e3;
		}

		/* 工具栏盒子 */
		.tool-bar {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 10px;
			padding: 18px;
			background: #fbfbfd;
			border-radius: 18px;
			margin-bottom: 16px;
		}

		/* 画布预览框 页面常驻 */
		.canvas-wrap {
			margin: 20px 0;
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			gap:12px;
		}
		#canvas {
			border: 1px solid #d2d2d7;
			border-radius: 16px;
			background: #fff;
			box-shadow: 0 2px 14px rgba(0, 0, 0, 0.03);
			display: block;
		}

		/* 悬浮文字输入框 */
		#edit-font {
			max-width: 152px;
			position: absolute;
			border: 1px solid #0071e3;
			background: rgba(255,255,255,0.96);
			display: none;
			border-radius: 8px;
			padding: 4px 6px;
			z-index: 100;
		}

		/* 日志框 */
		#log {
			width: 100%;
			height: 230px;
			border: 1px solid #d2d2d7;
			border-radius: 16px;
			padding: 16px;
			background: #fbfbfd;
			font-size: 13px;
			color: #333;
			overflow-y: auto;
		}

		/* 弹窗遮罩层 */
		.modal-mask {
			position: fixed;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.4);
			z-index: 99;
			display: none;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		/* 弹窗容器 */
		.modal-box {
			background: #fff;
			border-radius: 24px;
			max-width: 600px;
			width: 100%;
			max-height: 85vh;
			overflow-y: auto;
			padding: 30px;
			box-shadow: 0 8px 40px rgba(0,0,0,0.12);
			transform: scale(0.96);
			opacity: 0;
			transition: all 0.24s ease;
		}
		.modal-mask.show {
			display: flex;
		}
		.modal-mask.show .modal-box {
			transform: scale(1);
			opacity: 1;
		}
		.modal-close {
			text-align: right;
			margin-bottom: 12px;
		}

		/* 裁剪弹窗专用样式 */
		#cropModal .modal-box {
			max-width: 700px;
		}
		.crop-preview-wrap {
			width: 100%;
			max-height: 60vh;
			overflow: hidden;
			margin: 16px 0 24px;
		}
		#cropImage {
			max-width: 100%;
		}

		/* 移动端适配 */
		@media screen and (max-width: 620px) {
			.wrap {
				padding: 24px 20px;
			}
			.tool-bar {
				flex-direction: column;
				align-items: flex-start;
			}
			h2 {
				font-size: 26px;
			}
			.modal-box {
				padding: 20px;
			}
		}
	</style>
	<script type="application/javascript" src="js/dithering.js"></script>
	<script type="application/javascript" src="js/utils.js"></script>
</head>

<body>
	<div class="wrap">
		<h2>Etag图片上传工具</h2>
		
		<h5>设备蓝牙名称ESL/S24_*****</h5>
		<!-- 蓝牙连接区 -->
		<div class="section">
			<button class="btn-primary" id="connectbutton" onclick="preConnect();">连接设备</button>
			<button class="btn-secondary" onclick="reConnect();">重新连接</button>
			<button class="btn-secondary" onclick="toggleLogModal()">通讯日志</button>
		</div>

		<!-- 图片上传与图像算法 -->
		<div class="section">
			<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;">
				<!-- 修复：点击时清空input，保证同文件重复选择触发onchange -->
				<input type="file" id="image_file" onclick="this.value=''" onchange="openCropModal(this)" accept=".png,.jpg,.bmp,.webp">
				<span>抖动算法：</span>
				<select id="dithering">
					<optgroup label="黑白">
						<option value="none">二值化</option>
						<option value="bayer">Bayer</option>
						<option value="floydsteinberg">Floyd-Steinberg</option>
						<option value="Atkinson">Atkinson</option>
					</optgroup>
					<optgroup label="黑白红三色">
						<option value="bwr_floydsteinberg">三色Floyd-Steinberg</option>
						<option value="bwr_Atkinson">三色Atkinson</option>
					</optgroup>
				</select>
				<span>阈值：</span>
				<input type="number" max="255" min="0" value="125" id="threshold">
				<button class="btn-secondary" onclick="update_image()">重新渲染</button>
				<button class="btn-secondary" onclick="toggleCanvasModal()">画布编辑</button>
			</div>

			<!-- 【移出弹窗】常驻页面画布预览 + 上传按钮 -->
			<div class="canvas-wrap">
				<canvas id="canvas" width="152" height="152"></canvas>
				<button class="btn-save" onclick="upload_image()">上传至墨水屏</button>
			</div>
		</div>

		<!-- ========== 新增：图片裁剪弹窗 ========== -->
		<div class="modal-mask" id="cropModal">
			<div class="modal-box">
				<div class="modal-close">
					<button class="btn-secondary" onclick="closeCropModal()">关闭</button>
				</div>
				<h3>图片裁剪（固定1:1正方形）</h3>
				<div class="crop-preview-wrap">
					<img id="cropImage" />
				</div>
				<div style="text-align:center;">
					<button class="btn-primary" onclick="confirmCrop()">确认裁剪</button>
				</div>
			</div>
		</div>

		<!-- 画布编辑弹窗：仅保留编辑工具栏，无画布、无上传按钮 -->
		<div class="modal-mask" id="canvasModal">
			<div class="modal-box">
				<div class="modal-close">
					<button class="btn-secondary" onclick="toggleCanvasModal()">关闭</button>
				</div>
				<h3>画布编辑（画笔 / 文字）</h3>
				<div class="tool-bar">
					<span>编辑模式</span>
					<select id="canvas-mode">
						<option value="paint">画笔绘画</option>
						<option value="font">文字输入</option>
					</select>

					<span>尺寸</span>
					<input type="number" max="13" min="1" step="1" value="3" id="paint-size">

					<span>颜色</span>
					<select id="paint-color">
						<option value="black">黑色</option>
						<option value="red">红色</option>
						<option value="white">白色</option>
					</select>

					<select id="font" style="display: none;">
						<option value="微软雅黑">微软雅黑</option>
						<option value="黑体">黑体</option>
						<option value="仿宋">仿宋</option>
						<option value="宋体">宋体</option>
						<option value="楷体_GB2312">楷体</option>
						<option value="华文行楷">华文行楷</option>
					</select>

					<button id="update-text" class="btn-secondary" style="display: none;">保存文字</button>
					<button class="btn-secondary" onclick="clear_canvas()">清空画布</button>
				</div>
			</div>
		</div>

		<!-- 悬浮文字输入框 全局绝对定位 -->
		<input id="edit-font" />

		<!-- 日志弹窗 默认隐藏 -->
		<div class="modal-mask" id="logModal">
			<div class="modal-box">
				<div class="modal-close">
					<button class="btn-secondary" onclick="toggleLogModal()">关闭</button>
				</div>
				<h3>蓝牙通信日志</h3>
				<div id="log"></div>
			</div>
		</div>
	</div>
	<!-- 底部作者信息 -->
	<div style="margin-top:40px;padding-top:24px;border-top:1px solid #e8e8ed;text-align:center;color:#86868b;font-size:13px;">
    	<p>墨水屏图传工具 ©2026 周超</p>
	</div>

<script>
	// ===================== 裁剪全局变量 =====================
	let cropper = null;
	let tempFileObj = null;
	// 新增：缓存原始裁剪原图，用于切换算法重新渲染
	let originalCropCanvas = null;

	// 打开裁剪弹窗，传入选择的图片文件（修复：删除内部清空value代码）
	function openCropModal(fileInput) {
		if (!fileInput.files.length) return;
		tempFileObj = fileInput.files[0];
		const mask = document.getElementById("cropModal");
		const imgDom = document.getElementById("cropImage");
		// 销毁旧裁剪实例
		if (cropper) cropper.destroy();
		// 生成图片临时地址
		const imgUrl = URL.createObjectURL(tempFileObj);
		imgDom.src = imgUrl;
		mask.classList.add("show");
		// 等待DOM渲染完成初始化裁剪器
		setTimeout(()=>{
			cropper = new Cropper(imgDom, {
				aspectRatio: 1, // 强制1:1正方形比例
				viewMode: 1,
				autoCropArea: 0.9,
				checkCrossOrigin: false
			})
		}, 150)
	}

	// 关闭裁剪弹窗，销毁实例释放内存
	function closeCropModal() {
		const mask = document.getElementById("cropModal");
		mask.classList.remove("show");
		if (cropper) {
			cropper.destroy();
			cropper = null;
		}
	}

	// 确认裁剪，保存原始画布缓存，后续重渲染用原图
	function confirmCrop() {
		if (!cropper) return;
		// 获取裁剪后的画布（1:1）
		const cropCanvas = cropper.getCroppedCanvas({
			width: 152,
			height: 152,
			fillColor: '#fff'
		});
		// 缓存原始无抖动的画布
		originalCropCanvas = cropCanvas;

		// 绘制到页面主画布
		const mainCanvas = document.getElementById('canvas');
		const mainCtx = mainCanvas.getContext('2d');
		mainCtx.fillStyle = '#fff';
		mainCtx.fillRect(0,0,152,152);
		mainCtx.drawImage(cropCanvas, 0,0,152,152);
		// 执行抖动算法
		convert_dithering();
		// 关闭弹窗
		closeCropModal();
		tempFileObj = null;
	}

	// 弹窗开关函数
	function toggleCanvasModal() {
		const mask = document.getElementById("canvasModal");
		mask.classList.toggle("show");
	}
	function toggleLogModal() {
		const mask = document.getElementById("logModal");
		mask.classList.toggle("show");
	}

	// 【重点修复】重新渲染：基于缓存原图重算抖动，不再纯白清空
	function update_image () {
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext("2d");
		// 如果没有裁剪过图片，不执行渲染
		if (!originalCropCanvas) {
			alert("请先选择并裁剪一张图片");
			return;
		}
		// 先用原始裁剪图覆盖画布，再做新抖动
		ctx.fillStyle = "#fff";
		ctx.fillRect(0,0,152,152);
		ctx.drawImage(originalCropCanvas, 0, 0, 152, 152);
		convert_dithering();
	}

	function convert_dithering() {
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext("2d");
		const mode = document.getElementById('dithering').value;
		if (mode.startsWith('bwr')) {
			ditheringCanvasByPalette(canvas, bwrPalette, mode);
		} else {
			dithering(ctx, canvas.width, canvas.height, parseInt(document.getElementById('threshold').value), mode);
		}
	}

	// 原有全部JS逻辑完整保留，无任何删减修改
	let bleDevice;
	let gattServer;
	let epdService;
	let rxtxService;
	let epdCharacteristic;
	let rxtxCharacteristic;
	let reconnectTrys = 0;

	function delay(delayInms) {
	  return new Promise(resolve => {
		setTimeout(() => {
		  resolve(2);
		}, delayInms);
	  });
	}

	function resetVariables() {
		gattServer = null;
		epdService = null;
		epdCharacteristic = null;
		rxtxCharacteristic = null;
		rxtxService = null;
		document.getElementById("log").innerHTML = '';
	}

	async function handleError(error) {
		console.log(error);
		resetVariables();
		if (bleDevice == null)
			return;
		if (reconnectTrys <= 5) {
			reconnectTrys++;
			await connect();
		}
		else {
			addLog("连接失败，已终止重连");
			reconnectTrys = 0;
		}
	}

	async function sendCommand(cmd) {
		if (epdCharacteristic) {
			await epdCharacteristic.writeValueWithResponse(cmd)
		} else {
			addLog('未连接蓝牙，服务不可用')
		}
	}

	async function clearScreen(cmd) {
		addLog('执行清屏指令')
		await triggerEpdCmd(`00${cmd}`);
		await triggerEpdCmd('01')
	}

	async function rxTxSendCommand(cmd) {
	  if (rxtxCharacteristic) {
		await rxtxCharacteristic.writeValueWithResponse(cmd);
	  } else {
		  addLog('未连接蓝牙，串口服务不可用')
	  }
	}

	async function upload_tiff_image() {
		const startTime = new Date().getTime();
		const buffer = await document.getElementById('tiff_file').files[0].arrayBuffer();
		const arr = bytesToHex(buffer);

		addLog(`开始上传tiff, 大小 ${(arr.length/1024).toFixed(2)}KB`);

		await sendCommand(hexToBytes("0000"));
		await sendCommand(hexToBytes("020000"));

		const step = 480;
		let partIndex = 0;
		for (let i = 0; i < arr.length; i += step) {
			addLog(`正在上传第${partIndex+1}块. 块长度: ${step}字节`);
			await sendCommand(hexToBytes("03" + arr.slice(i, i + step)));
			partIndex += 1;
		}

		await sendCommand(hexToBytes("04"));
		addLog(`TIFF上传完成，耗时${((new Date().getTime() - startTime)/1000).toFixed(2)}s`);
	}

	async function sendBufferData(value, type) {
		addLog(`开始发送图像通道:${type}, 总数据 ${(value.length/2/1024).toFixed(2)}KB`);
		let code = 'ff';
		if (type === 'bwr') {
			code = '00';
		}
		const step = 480;
		let partIndex = 0;
		for (let i = 0; i < value.length; i += step) {
			addLog(`发送分片${partIndex+1}，偏移地址: ${i/2}`);
			await sendCommand(hexToBytes("03" + code + intToHex(i / 2, 2) + value.substring(i, i + step)));
			partIndex += 1;
		}
	}

	async function upload_image() {
    	const canvasOrigin = document.getElementById('canvas');
    	const ctxOrigin = canvasOrigin.getContext('2d');
    	const startTime = new Date().getTime();

    // 创建离屏画布，用于旋转图像，不影响页面预览画布
    	const offCanvas = document.createElement('canvas');
    	const offCtx = offCanvas.getContext('2d');
    // 原图152*152，左旋90后宽高互换
    	offCanvas.width = canvasOrigin.height;
    	offCanvas.height = canvasOrigin.width;

    // 旋转绘制：向左旋转90度
    	offCtx.save();
    // 平移原点到新画布右上角
    	offCtx.translate(0, offCanvas.height);
    // 逆时针旋转90度
    	offCtx.rotate(-Math.PI / 2);
    // 绘制原图
    	offCtx.drawImage(canvasOrigin, 0, 0);
    	offCtx.restore();

    // 下发前置指令
    	await sendCommand(hexToBytes("0000"));
    	await sendCommand(hexToBytes("020000"));
    // 发送旋转后的离屏画布数据
    	await sendBufferData(bytesToHex(canvas2bytes(offCanvas)), 'bw')
    	await sendBufferData(bytesToHex(canvas2bytes(offCanvas, 'bwr')), 'bwr')
    	await sendCommand(hexToBytes("0101"))

    	addLog(`屏幕刷新完成，耗时${((new Date().getTime() - startTime)/1000).toFixed(2)}s`);
}

	async function upload_epd_buffer() {
		const startTime = new Date().getTime();
		const value = document.getElementById('buffer').value.replace(/(?:\r\n|\r|\n|,|0x| )/g, '');

		addLog(`载入屏幕内存数据，大小 ${(value.length/1024).toFixed(2)}KB`);

		await sendCommand(hexToBytes("0000"));
		await sendCommand(hexToBytes("020000"));
		await sendBufferData(value, 'bw');
		await delay(150);
		await sendCommand(hexToBytes("0101"))

		addLog(`刷新完成，耗时${((new Date().getTime() - startTime)/1000).toFixed(2)}s`);
	}

	async function triggerRxTxCmd(cmd) {
		addLog(`下发串口指令: ${cmd}`)
		await rxTxSendCommand(hexToBytes(cmd));
	}

	async function triggerEpdCmd(cmd) {
		addLog(`下发屏幕指令: ${cmd}`)
		await sendCommand(hexToBytes(cmd));
	}

	function disconnect() {
		resetVariables();
		addLog('蓝牙连接已断开');
		document.getElementById("connectbutton").innerHTML = '连接设备';
	}

	async function preConnect() {
		if (gattServer != null && gattServer.connected) {
			if (bleDevice != null && bleDevice.gatt.connected)
				bleDevice.gatt.disconnect();
		}
		else {
			reconnectTrys = 0;
			bleDevice = await navigator.bluetooth.requestDevice({ optionalServices: ['0000221f-0000-1000-8000-00805f9b34fb', '00001f10-0000-1000-8000-00805f9b34fb', '13187b10-eba9-a3ba-044e-83d3217d9a38'], acceptAllDevices: true });
			bleDevice.addEventListener('gattserverdisconnected', disconnect);
			try {
				await connect();
			} catch (e) {
				await handleError(e);
			}
		}
	}

	async function connectRXTX() {
		rxtxService = await gattServer.getPrimaryService('00001f10-0000-1000-8000-00805f9b34fb');
		addLog('✅ 找到串口服务');

		rxtxCharacteristic = await rxtxService.getCharacteristic('00001f1f-0000-1000-8000-00805f9b34fb');
		addLog('✅ 串口通道建立完成');
	}

	async function reConnect() {
		if (bleDevice != null && bleDevice.gatt.connected)
			bleDevice.gatt.disconnect();
		resetVariables();
		addLog("正在重新建立蓝牙连接...");
		setTimeout(async function () { await connect(); }, 300);
	}

	async function connect() {
		if (epdCharacteristic == null) {
			addLog("正在连接设备: " + bleDevice.name);

			gattServer = await bleDevice.gatt.connect();
			addLog('✅ 成功连接GATT服务端');

			epdService = await gattServer.getPrimaryService('13187b10-eba9-a3ba-044e-83d3217d9a38');
			addLog('✅ 墨水屏服务已识别');

			epdCharacteristic = await epdService.getCharacteristic('4b646063-6264-f3a7-8941-e65356ea82fe');
			addLog('✅ 屏幕数据通道就绪');

			await epdCharacteristic.startNotifications();

			epdCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
				console.log('epd ret', bytesToHex(event.target.value.buffer))
				const count = parseInt('0x'+ bytesToHex(event.target.value.buffer));
				addLog(`📥 设备回传数据: ${count} 字节`);
			});

			document.getElementById("connectbutton").innerHTML = '断开连接';
			await connectRXTX();
		}
	}

	function addLog(logTXT) {
		const today = new Date();
		const h = String(today.getHours()).padStart(2, '0');
		const m = String(today.getMinutes()).padStart(2, '0');
		const s = String(today.getSeconds()).padStart(2, '0');
		const time = `${h}:${m}:${s}  `;

		const dom = document.getElementById("log");
		dom.innerHTML += time + logTXT + '<br>';
		dom.scrollTop = dom.scrollHeight;
	}

	function getUnixTime() {
		const hourOffset = document.getElementById('hour-offset')?.value || 8;
	  	const unixNow = Math.round(Date.now() / 1000)+(60*60*hourOffset)  - new Date().getTimezoneOffset() * 60;

		const date = new Date((unixNow + new Date().getTimezoneOffset() * 60)*1000);
	  	const localeTimeString = date.toLocaleTimeString();

		return {unixNow, localeTimeString, year: date.getFullYear(), month: date.getMonth() + 1, day: date.getDate(), week: date.getDay() || 7}
	}

	function get_position(canvas, x, y){
		let rect = canvas.getBoundingClientRect()
		return {
			x: x - rect.left * (canvas.width/rect.width),
			y: y - rect.top * (canvas.height/rect.height)
		}
	}

	function clear_canvas() {
		if(confirm('确认清空画布所有内容？')) {
			const canvas = document.getElementById('canvas');
			const ctx = canvas.getContext("2d");
			ctx.fillStyle = 'white';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			// 清空原图缓存
			originalCropCanvas = null;
		}
	}

	document.body.onload = () => {
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext("2d");
		ctx.fillStyle = 'white';
		ctx.fillRect(0, 0, canvas.width, canvas.height);

		let is_allow_drawing = false;
		let is_allow_move_editor = false;
		const image_mode = document.getElementById('canvas-mode');
		const paint_size = document.getElementById('paint-size');
		const paint_color = document.getElementById('paint-color');
		const editor = document.getElementById('edit-font');
		const font = document.getElementById('font');
		document.getElementById('dithering').value = 'bwr_Atkinson';
		image_mode.value = 'paint';
		paint_color.value = 'black';
		font.value = '黑体';

		editor.onmousemove = function (e) {
			editor.style.fontSize = `${paint_size.value * 10}px`;
			editor.style.color = paint_color.value;
			editor.style.fontFamily = font.value;
			editor.style.fontWeight = 'bold';

			if (is_allow_move_editor) {
				const {x, y} = get_position(canvas, e.clientX, e.clientY);
				if (x < 0 || y < 0 || x > canvas.width || y > canvas.height) {
					return;
				}
				editor.style.left = `${e.clientX-20}px`;
				editor.style.top = `${e.clientY-20}px`;
			}
		}

		editor.onmousedown = function () {
			is_allow_move_editor = true;
		}
		editor.onmouseup = function () {
			is_allow_move_editor = false;
		}

		document.getElementById('update-text').onclick = function () {
			if (!editor.value.length) {
				alert('请先输入文字内容');
				return;
			}
			editor.style.display = 'none';
			ctx.beginPath();
			ctx.font = `bold ${paint_size.value * 10}px ${font.value}`;
			ctx.fillStyle = paint_color.value;
			const {x, y} = get_position(canvas, parseInt(editor.style.left), parseInt(editor.style.top) + paint_size.value * 10);
			ctx.fillText(editor.value, x, y);
		}

		image_mode.onchange = function (e) {
			if (image_mode.value === 'font') {
				document.getElementById('update-text').style.display = 'inline-block';
				document.getElementById('font').style.display = 'inline-block';
				editor.style.display='block';
				editor.style.left = `${e.clientX}px`;
				editor.style.top = `${e.clientY}px`;
				return;
			}
			document.getElementById('update-text').style.display = 'none';
			document.getElementById('font').style.display = 'none';
			editor.style.display='none';
		}

		paint_size.onchange = function () {
			if (image_mode.value === 'font') {
				editor.style.fontSize =  `${paint_size.value * 10}px`;
			}
		}
		paint_color.onchange = function () {
			if (image_mode.value === 'font') editor.style.color = paint_color.value;
		}
		font.onchange = function () {
			if (image_mode.value === 'font') editor.style.fontFamily = font.value;
		}

		canvas.onmousedown = function(e) {
			let { x, y } = get_position(canvas, e.clientX, e.clientY)
			switch (image_mode.value) {
				case 'paint':
					is_allow_drawing = true;
					ctx.beginPath();
					ctx.moveTo(x, y);
					break;
				case 'font':
					editor.style.display='block';
					editor.style.left = `${e.clientX}px`;
					editor.style.top = `${e.clientY}px`;
					editor.style.fontSize = `${paint_size.value * 10}px`;
					editor.style.color = paint_color.value;
					editor.style.fontFamily = font.value;
					editor.style.fontWeight = 'bold';
					editor.focus();
					break
			}
		};

		canvas.onmousemove = (e) => {
			let { x, y } = get_position(canvas, e.clientX, e.clientY);
			if(image_mode.value === 'paint' && is_allow_drawing){
				ctx.lineWidth = paint_size.value;
				ctx.strokeStyle=paint_color.value;
				ctx.lineTo(x, y);
				ctx.stroke();
			}
		}

		canvas.onmouseup = function() {
			if(image_mode.value === 'paint') is_allow_drawing = false;
			if(image_mode.value === 'font') is_allow_move_editor = false;
		}
		canvas.onmouseleave = function () {
			if (image_mode.value === 'paint') is_allow_drawing = false;
		}
	}
</script>
